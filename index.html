<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The AI Time Audit | Tausha Dickinson Photography</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/cormorant-garamond@5.0.16/400.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/cormorant-garamond@5.0.16/400-italic.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/cormorant-garamond@5.0.16/700.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/dm-sans@5.0.20/400.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/dm-sans@5.0.20/500.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
html{scroll-behavior:smooth;}

:root{
  --black:#000000;--app:#0d0d0d;--card:#141414;--bubble:#1a1a1a;--user-bubble:#222222;
  --border:#262626;--border-mid:#2e2e2e;--white:#ffffff;
  --text-dim:rgba(255,255,255,0.52);--text-body:rgba(255,255,255,0.85);
  --gold:#c9a96e;--gold-bright:#d9bb82;--gold-dim:rgba(201,169,110,0.14);--gold-dim2:rgba(201,169,110,0.06);
  --panel-bg:#ffffff;--panel-text:#111111;--panel-border:#e5e5e5;--panel-btn:#f9f9f9;
  --cta-bg:#f4f4f4;--radius:8px;--radius-sm:5px;
}

html,body{
  height:auto;min-height:100%;background:var(--app);
  font-family:'DM Sans',sans-serif;color:var(--white);
  -webkit-text-size-adjust:100%;overflow-x:hidden;
  overflow-y:auto;margin:0;padding:0;
}
#app{
  background:var(--app);width:100%;
  display:flex;flex-direction:column;
}

/* ── WELCOME ── */
.screen-welcome{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:100px 36px 120px;flex:1;
  position:relative;overflow:hidden;
  min-height:600px;
}
.screen-welcome::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 30%,rgba(201,169,110,0.07) 0%,transparent 65%);
  pointer-events:none;
}
.welcome-eyebrow{color:var(--gold);letter-spacing:0.3em;font-size:11px;text-transform:uppercase;font-weight:500;margin-bottom:32px;position:relative;}
.welcome-title{font-family:'Cormorant Garamond',serif;font-size:clamp(52px,12vw,82px);font-weight:400;color:var(--white);line-height:0.95;letter-spacing:-0.01em;margin-bottom:10px;position:relative;}
.welcome-title em{font-style:italic;color:var(--gold);}
.welcome-rule{width:1px;height:44px;background:linear-gradient(to bottom,transparent,var(--gold),transparent);margin:28px auto;}
.welcome-sub{font-size:clamp(15px,2.2vw,17px);color:var(--text-body);max-width:360px;line-height:1.85;margin-bottom:52px;position:relative;}
.btn-begin{
  display:inline-flex;align-items:center;background:transparent;border:1px solid var(--gold);color:var(--gold);
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.28em;text-transform:uppercase;
  padding:18px 52px;cursor:pointer;transition:background 0.2s,color 0.2s;-webkit-tap-highlight-color:transparent;position:relative;
}
.btn-begin:hover,.btn-begin:active{background:var(--gold);color:var(--black);}
.welcome-note{font-size:13px;color:var(--text-dim);margin-top:20px;position:relative;letter-spacing:0.04em;}

/* ── PROGRESS ── */
.progress-wrap{height:1px;background:var(--border);flex-shrink:0;position:sticky;top:0;z-index:10;}
.progress-fill{height:1px;background:var(--gold);transition:width 0.55s cubic-bezier(0.4,0,0.2,1);}

/* Content max-width wrapper for wide screens */
.content-wrap{width:100%;max-width:760px;margin:0 auto;}

/* ── CHAT HEADER ── */
.chat-header{
  padding:16px 22px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
  background:var(--app);
}
.avatar{width:28px;height:28px;border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.avatar-dot{width:9px;height:9px;background:var(--gold);border-radius:50%;}
.chat-name{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--white);}
.prog-label{margin-left:auto;font-size:13px;color:var(--text-dim);letter-spacing:0.06em;}

/* ── MESSAGES ── */
.messages{padding:14px 22px 10px;display:flex;flex-direction:column;gap:6px;flex:0 0 auto;min-height:0;}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-bot{display:flex;gap:10px;align-items:flex-start;max-width:88%;}
.msg-bot.new{animation:slideUp 0.3s ease forwards;}
.bot-icon{width:22px;height:22px;border:1px solid var(--gold);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:3px;}
.bot-dot{width:7px;height:7px;background:var(--gold);border-radius:50%;}
.bot-bbl{background:var(--bubble);padding:12px 16px;border-radius:0 var(--radius) var(--radius) var(--radius);font-size:clamp(14px,2.3vw,15px);color:var(--text-body);line-height:1.7;}
.msg-user{display:flex;justify-content:flex-end;}
.msg-user.new{animation:slideUp 0.22s ease forwards;}
.user-bbl{background:var(--user-bubble);border:1px solid var(--border-mid);padding:10px 16px;border-radius:var(--radius) 0 var(--radius) var(--radius);font-size:clamp(13px,2.2vw,14px);color:rgba(255,255,255,0.7);max-width:82%;line-height:1.6;}
.typing-bubble{display:flex;gap:10px;align-items:flex-start;animation:slideUp 0.22s ease forwards;}
.typing-dots{background:var(--bubble);padding:13px 17px;border-radius:0 var(--radius) var(--radius) var(--radius);display:flex;align-items:center;gap:5px;}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.td{width:6px;height:6px;background:rgba(255,255,255,0.3);border-radius:50%;}
.td1{animation:bounce 1.1s infinite 0s;}.td2{animation:bounce 1.1s infinite 0.18s;}.td3{animation:bounce 1.1s infinite 0.36s;}

/* ── QUESTION PANEL ── */
.q-panel{background:var(--panel-bg);border-top:1px solid var(--panel-border);flex-shrink:0;}
.q-header{padding:14px 22px 0;}
.q-text{font-size:clamp(15px,2.5vw,17px);color:var(--panel-text);line-height:1.5;font-weight:500;font-family:'DM Sans',sans-serif;}
.q-options{padding:12px 22px 14px;display:flex;flex-wrap:wrap;gap:8px;}
.btn-opt{
  background:var(--panel-btn);border:1px solid #e0e0e0;color:var(--panel-text);
  font-family:'DM Sans',sans-serif;font-size:clamp(13px,2.2vw,15px);
  padding:11px 16px;cursor:pointer;border-radius:var(--radius-sm);
  text-align:left;line-height:1.35;min-height:44px;
  transition:border-color 0.15s,background 0.15s;-webkit-tap-highlight-color:transparent;
}
.btn-opt:hover,.btn-opt:active{border-color:var(--gold);background:#fffbf5;}
.btn-opt.selected{border-color:var(--gold);background:#fffbf5;}

/* ── TAP-TO-RANK ── */
.rank-hint{font-size:12px;color:#888;margin-top:5px;padding:0 22px;line-height:1.5;}
.rank-opts{padding:10px 22px 4px;display:flex;flex-direction:column;gap:6px;}
.btn-rank{
  background:var(--panel-btn);border:1px solid #e0e0e0;color:var(--panel-text);
  font-family:'DM Sans',sans-serif;font-size:clamp(13px,2.2vw,15px);
  padding:11px 14px;cursor:pointer;border-radius:var(--radius-sm);
  text-align:left;line-height:1.35;min-height:44px;
  transition:border-color 0.15s,background 0.15s;-webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;gap:10px;width:100%;
}
.btn-rank:hover{border-color:var(--gold);background:#fffbf5;}
.btn-rank.ranked{border-color:var(--gold);background:#fffbf5;}
.rank-badge{
  width:22px;height:22px;border-radius:50%;background:var(--gold);color:var(--black);
  font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  opacity:0;transition:opacity 0.15s;
}
.btn-rank.ranked .rank-badge{opacity:1;}
.rank-label{flex:1;}
.rank-footer{padding:10px 22px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.rank-tally{font-size:13px;color:#888;}
.btn-rank-next{
  background:var(--black);color:var(--white);border:none;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  letter-spacing:0.2em;text-transform:uppercase;padding:13px 28px;
  cursor:pointer;border-radius:var(--radius-sm);
  transition:background 0.15s,opacity 0.15s;-webkit-tap-highlight-color:transparent;
}
.btn-rank-next:disabled{opacity:0.28;cursor:default;}
.btn-rank-next:not(:disabled):hover{background:#222;}

/* ── TEXT INPUT ── */
.q-text-zone{padding:12px 22px 16px;display:flex;gap:10px;align-items:flex-end;}
textarea{
  flex:1;background:var(--panel-btn);border:1px solid #e0e0e0;color:var(--panel-text);
  font-family:'DM Sans',sans-serif;font-size:clamp(14px,2.5vw,16px);
  padding:12px 16px;border-radius:var(--radius-sm);resize:none;height:54px;
  outline:none;line-height:1.55;-webkit-appearance:none;transition:border-color 0.15s;
}
textarea::placeholder{color:rgba(17,17,17,0.3);}
textarea:focus{border-color:var(--gold);}
.btn-send{
  background:var(--gold);border:none;color:var(--black);
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
  padding:0 22px;cursor:pointer;border-radius:var(--radius-sm);height:50px;
  flex-shrink:0;min-width:72px;-webkit-tap-highlight-color:transparent;transition:background 0.15s;
}
.btn-send:hover,.btn-send:active{background:var(--gold-bright);}

/* ── LOADING ── */
.loading-zone{padding:32px 22px 36px;flex-shrink:0;border-top:1px solid var(--border);}
.loading-top{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.25}}
.loading-dot{width:8px;height:8px;background:var(--gold);border-radius:50%;animation:pulse 1.4s infinite;flex-shrink:0;}
.loading-text{font-size:16px;color:var(--text-body);}
.loading-bar-bg{height:1px;background:var(--border);overflow:hidden;}
@keyframes loadProgress{0%{width:0%}8%{width:12%}20%{width:28%}38%{width:46%}55%{width:62%}72%{width:74%}88%{width:82%}100%{width:86%}}
.loading-bar-animate{height:1px;background:var(--gold);animation:loadProgress 40s ease-out forwards;}
.loading-note{font-size:13px;color:var(--text-dim);margin-top:12px;}

/* ── RESULTS ── */
.results-wrap{flex:1;display:flex;flex-direction:column;}
.r-header{padding:52px 28px 40px;text-align:center;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
.r-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,169,110,0.08) 0%,transparent 70%);pointer-events:none;}
.r-eyebrow{color:var(--gold);letter-spacing:0.3em;font-size:11px;text-transform:uppercase;font-weight:500;margin-bottom:16px;position:relative;}
.r-title{font-family:'Cormorant Garamond',serif;font-size:clamp(32px,6vw,52px);font-weight:400;color:var(--white);line-height:1.1;position:relative;}
.r-title em{font-style:italic;color:var(--gold);}

.goal-note{margin:0;padding:24px 22px;border-bottom:1px solid var(--border);background:var(--card);}
.goal-note-inner{border-left:2px solid var(--gold);padding:14px 18px;border-radius:0 4px 4px 0;}
.goal-note-text{font-family:'Cormorant Garamond',serif;font-size:clamp(17px,3vw,21px);font-style:italic;color:var(--white);line-height:1.65;font-weight:400;}

.recs{padding:28px 22px 16px;display:flex;flex-direction:column;gap:14px;}
@keyframes recReveal{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.rec{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;opacity:0;animation:recReveal 0.5s ease forwards;}
.rec-header{padding:22px 22px 0;display:flex;align-items:flex-start;gap:14px;}
.rec-num{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold);flex-shrink:0;padding-top:5px;letter-spacing:0.1em;min-width:26px;}
.rec-title-wrap{flex:1;}
.rec-title{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,3.8vw,26px);color:var(--white);line-height:1.2;font-weight:400;}
.tool-chip{
  display:inline-flex;align-items:center;gap:6px;margin-top:8px;
  padding:5px 10px;border:1px solid rgba(201,169,110,0.35);border-radius:3px;
  color:var(--gold);font-size:12px;font-family:'DM Sans',sans-serif;
  letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;
  background:var(--gold-dim2);transition:background 0.15s,border-color 0.15s;-webkit-tap-highlight-color:transparent;
}
.tool-chip:hover,.tool-chip:active{background:var(--gold-dim);border-color:var(--gold);}
.rec-body{padding:16px 22px 18px;font-size:clamp(14px,2.3vw,15px);color:var(--text-body);line-height:1.82;}
.rec-divider{height:1px;background:var(--border);margin:0 22px;}
.prompts-section{padding:18px 22px 20px;}
.prompts-eyebrow{font-size:11px;color:var(--gold);letter-spacing:0.28em;text-transform:uppercase;font-weight:500;margin-bottom:12px;}
.prompt-item{background:var(--black);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;}
.prompt-item:last-child{margin-bottom:0;}
.prompt-text{font-size:clamp(12px,1.9vw,13px);color:rgba(255,255,255,0.72);line-height:1.78;flex:1;font-family:'DM Sans',sans-serif;}
.copy-btn{background:transparent;border:1px solid var(--border-mid);color:rgba(255,255,255,0.38);font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:0.06em;padding:6px 12px;cursor:pointer;border-radius:3px;flex-shrink:0;min-height:32px;transition:border-color 0.15s,color 0.15s;-webkit-tap-highlight-color:transparent;}
.copy-btn:hover,.copy-btn:active,.copy-btn.copied{border-color:var(--gold);color:var(--gold);}
.further-reading{padding:14px 22px 20px;border-top:1px solid var(--border);display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;font-size:13px;color:var(--text-dim);line-height:1.65;}
.further-reading a{color:var(--gold);text-decoration:none;}
.further-reading a:hover{text-decoration:underline;}

/* ── CTA ── */
.r-cta{background:var(--cta-bg);border-top:1px solid #e5e5e5;padding:48px 28px 64px;text-align:center;}
.r-cta-eyebrow{color:#888;letter-spacing:0.26em;font-size:11px;text-transform:uppercase;font-weight:500;margin-bottom:20px;}
.r-cta-title{font-family:'Cormorant Garamond',serif;font-size:clamp(34px,6vw,52px);font-weight:400;color:var(--black);line-height:1.1;margin-bottom:18px;}
.r-cta-title em{font-style:italic;color:var(--gold);}
.r-cta-body{font-size:clamp(15px,2.2vw,17px);color:#444;line-height:1.85;max-width:400px;margin:0 auto 36px;}
.btn-cta-main{display:inline-block;background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.28em;text-transform:uppercase;padding:18px 48px;text-decoration:none;border:none;cursor:pointer;transition:background 0.2s;-webkit-tap-highlight-color:transparent;}
.btn-cta-main:hover{background:#222;}
.r-cta-divider{width:1px;height:36px;background:#ddd;margin:28px auto;}
.btn-download{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1px solid #ccc;color:#666;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;padding:14px 28px;cursor:pointer;border-radius:var(--radius-sm);transition:border-color 0.15s,color 0.15s;-webkit-tap-highlight-color:transparent;}
.btn-download:hover{border-color:var(--gold);color:var(--gold);}
.btn-restart{display:block;background:transparent;border:none;color:#bbb;font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:0.18em;text-transform:uppercase;margin:20px auto 0;cursor:pointer;padding:8px;-webkit-tap-highlight-color:transparent;transition:color 0.15s;}
.btn-restart:hover{color:#888;}

/* ── INLINE EMAIL CAPTURE (results bottom, shown only if skipped gate) ── */
.results-email-cap{
  background:var(--card);border-top:1px solid var(--border);
  padding:36px 28px 44px;text-align:center;
}
.results-email-eyebrow{color:var(--gold);letter-spacing:0.28em;font-size:11px;text-transform:uppercase;font-weight:500;margin-bottom:14px;}
.results-email-title{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,4vw,32px);font-weight:400;color:var(--white);line-height:1.2;margin-bottom:10px;}
.results-email-sub{font-size:14px;color:var(--text-dim);line-height:1.7;margin-bottom:22px;max-width:320px;margin-left:auto;margin-right:auto;}
.results-email-fields{display:flex;flex-direction:column;gap:8px;max-width:360px;margin:0 auto 10px;}
.results-email-field{
  width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border-mid);
  color:var(--white);font-family:'DM Sans',sans-serif;font-size:15px;
  padding:13px 16px;border-radius:var(--radius-sm);outline:none;
  transition:border-color 0.15s;-webkit-appearance:none;
}
.results-email-field::placeholder{color:rgba(255,255,255,0.25);}
.results-email-field:focus{border-color:var(--gold);}
.btn-results-email{
  width:100%;max-width:360px;background:var(--gold);color:var(--black);border:none;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  letter-spacing:0.24em;text-transform:uppercase;padding:16px 24px;
  cursor:pointer;border-radius:var(--radius-sm);margin:0 auto;display:block;
  transition:background 0.15s,opacity 0.15s;-webkit-tap-highlight-color:transparent;
}
.btn-results-email:hover:not(:disabled){background:var(--gold-bright);}
.btn-results-email:disabled{opacity:0.45;cursor:default;}
.results-email-status{font-size:13px;color:var(--gold);margin-top:10px;min-height:18px;letter-spacing:0.04em;}
.results-email-error{font-size:13px;color:#e07070;margin-top:8px;min-height:18px;}

/* ── GATE SCREEN ── */
.screen-gate{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;padding:80px 36px 100px;text-align:center;
  position:relative;overflow:hidden;
}
.screen-gate::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 30%,rgba(201,169,110,0.07) 0%,transparent 65%);
  pointer-events:none;
}
.gate-eyebrow{color:var(--gold);letter-spacing:0.3em;font-size:11px;text-transform:uppercase;font-weight:500;margin-bottom:24px;position:relative;}
.gate-title{font-family:'Cormorant Garamond',serif;font-size:clamp(34px,7vw,52px);font-weight:400;color:var(--white);line-height:1.1;margin-bottom:16px;position:relative;}
.gate-title em{font-style:italic;color:var(--gold);}
.gate-rule{width:1px;height:36px;background:linear-gradient(to bottom,transparent,var(--gold),transparent);margin:0 auto 22px;}
.gate-sub{font-size:clamp(14px,2vw,16px);color:var(--text-body);max-width:340px;line-height:1.8;margin-bottom:36px;position:relative;}
.gate-form{width:100%;max-width:400px;position:relative;}
.gate-field{
  width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border-mid);
  color:var(--white);font-family:'DM Sans',sans-serif;font-size:15px;
  padding:14px 18px;border-radius:var(--radius-sm);outline:none;margin-bottom:10px;
  transition:border-color 0.15s;-webkit-appearance:none;
}
.gate-field::placeholder{color:rgba(255,255,255,0.28);}
.gate-field:focus{border-color:var(--gold);}
.btn-gate-submit{
  width:100%;background:var(--gold);color:var(--black);border:none;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  letter-spacing:0.26em;text-transform:uppercase;padding:17px 24px;
  cursor:pointer;border-radius:var(--radius-sm);margin-top:4px;
  transition:background 0.15s,opacity 0.15s;-webkit-tap-highlight-color:transparent;
}
.btn-gate-submit:hover:not(:disabled){background:var(--gold-bright);}
.btn-gate-submit:disabled{opacity:0.5;cursor:default;}
.gate-sending{font-size:13px;color:var(--gold);margin-top:12px;min-height:20px;letter-spacing:0.04em;}
.gate-error{font-size:13px;color:#e07070;margin-top:10px;min-height:20px;}
.btn-gate-skip{
  background:transparent;border:none;color:var(--text-dim);
  font-family:'DM Sans',sans-serif;font-size:13px;letter-spacing:0.1em;
  cursor:pointer;margin-top:20px;padding:6px;text-decoration:underline;
  text-underline-offset:3px;-webkit-tap-highlight-color:transparent;
  transition:color 0.15s;position:relative;
}

function buildRecs(){

  const stage = answers.stage || 'Growing and finding my footing';
  const fallbackDrains = ['Client emails and communication','Social media and marketing','Admin, invoicing and proposals'];
  const r2 = DRAIN_RECS[drains[0]] || DRAIN_RECS[fallbackDrains[0]];
  const r3 = DRAIN_RECS[drains[1]] || DRAIN_RECS[fallbackDrains[1]];
  const r4 = DRAIN_RECS[drains[2]] || DRAIN_RECS[fallbackDrains[2]];
  const r5 = STAGE_RECS[stage] || STAGE_RECS['Growing and finding my footing'];
  return [REC_BRAND_VOICE, r2, r3, r4, r5];
}

function scrollToBottom(){setTimeout(()=>{window.scrollTo(0,document.body.scrollHeight);},80);}

function copyPrompt(btn){
  const item=btn.closest('.prompt-item');
  const text=item.querySelector('.prompt-text').textContent||'';
  const finish=()=>{btn.textContent='Copied';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2200);};
  const fallback=()=>{const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;top:0;left:0;opacity:0;pointer-events:none;';document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand('copy');finish();}catch(e){btn.textContent='Select + copy';}document.body.removeChild(ta);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(finish).catch(fallback);}else{fallback();}
}

      q2_drain: answers.drain||'Not provided',
      q8_dream: answers.dream||'Not provided',
      recs_full: recsFull,
      closing_note: answers.dream
        ? `You said you want to ${answers.dream.charAt(0).toLowerCase()+answers.dream.slice(1).replace(/\.+$/,'')}. Every recommendation here is built to buy back the hours keeping you from it.`
        : ''
    };

    // Send both independently so one failure doesn't kill the other
    const taushaSend = ejsSend(EMAILJS_TEMPLATE_TAUSHA, taushаParams)
      .catch(err=>console.warn('Tausha copy failed:',err.message));
    const photogSend = ejsSend(EMAILJS_TEMPLATE_PHOTOGRAPHER, photographerParams)
      .catch(err=>{ throw err; });
    await Promise.all([taushaSend, photogSend]);

    if(sending){sending.textContent='Sent! Check your inbox.';}
    gateEmail = email;
    setTimeout(()=>{ phase='results'; render(); }, 1200);

  }catch(err){
    console.error('EmailJS error full:', JSON.stringify(err), err.text, err.status);
    if(errEl){errEl.textContent='Something went wrong sending the email. Showing your results now.';}
    if(btn){btn.disabled=false;}
    if(sending){sending.textContent='';}
    setTimeout(()=>{ phase='results'; render(); }, 2000);
  }
  gateSending=false;
}

/* ── GATE: skip ── */
function skipGate(){
  phase='results';
  render();
}
function screenChat(){
  const prog=Math.min(qIdx,TOTAL_Q),pct=(prog/TOTAL_Q)*100;
  const historyHTML=msgs.map((m,i)=>{
    const isNew=(i===newMsgIdx||i===newMsgIdx+1);
    if(m.role==='bot')return`<div class="msg-bot${isNew?' new':''}"><div class="bot-icon"><div class="bot-dot"></div></div><div class="bot-bbl">${m.content}</div></div>`;
    return`<div class="msg-user${isNew?' new':''}"><div class="user-bbl">${m.content}</div></div>`;
  }).join('');
  const typingHTML=isTyping?`<div class="typing-bubble"><div class="bot-icon"><div class="bot-dot"></div></div><div class="typing-dots"><div class="td td1"></div><div class="td td2"></div><div class="td td3"></div></div></div>`:'';
  let panel='';
  if(!isTyping&&qIdx<Qs.length){
    const q=Qs[qIdx];
    if(q.type==='btn'){
      panel=`<div class="q-panel"><div class="q-header"><p class="q-text">${q.text}</p></div><div class="q-options">${q.opts.map(o=>`<button class="btn-opt" onclick="answerBtn(this)" data-v="${o.replace(/"/g,'&quot;')}">${o}</button>`).join('')}</div></div>`;
    }else if(q.type==='rank'){
      panel=buildRankPanel(q);
    }else{
      panel=`<div class="q-panel"><div class="q-header"><p class="q-text">${q.text}</p></div><div class="q-text-zone"><textarea id="ainput" placeholder="${q.ph}" onkeydown="handleKey(event)" rows="2"></textarea><button class="btn-send" onclick="submitText()">Send</button></div></div>`;
    }
  }
  return`
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="content-wrap">
    <div class="chat-header"><div class="avatar"><div class="avatar-dot"></div></div><span class="chat-name">AI Time Audit</span><span class="prog-label">${prog} of ${TOTAL_Q}</span></div>
    <div id="msgs" class="messages">${historyHTML}${typingHTML}</div>
    ${panel}
    </div>`;}

/* ── RANK PANEL ── */
function buildRankPanel(q){
  const optsHTML=q.opts.map(opt=>{
    const ri=rankSelections.indexOf(opt);
    const ranked=ri!==-1;
    return`<button class="btn-rank${ranked?' ranked':''}" onclick="toggleRank(this)" data-v="${opt.replace(/"/g,'&quot;')}"><span class="rank-badge">${ranked?ri+1:''}</span><span class="rank-label">${opt}</span></button>`;
  }).join('');
  const count=rankSelections.length;
  const tally=count===0?'None selected yet':count===1?'1 selected':`${count} selected`;
  return`<div class="q-panel"><div class="q-header"><p class="q-text">${q.text}</p></div><p class="rank-hint">Tap your biggest drain first. Pick up to 3, or just 1 if that is your answer.</p><div class="rank-opts">${optsHTML}</div><div class="rank-footer"><span class="rank-tally">${tally}</span><button class="btn-rank-next" onclick="submitRank()"${count===0?' disabled':''}>Next</button></div></div>`;}

function toggleRank(btn){
  const val=btn.dataset.v;
  const idx=rankSelections.indexOf(val);
  if(idx!==-1){rankSelections.splice(idx,1);}
  else{if(rankSelections.length>=3)return;rankSelections.push(val);}
  const q=Qs[qIdx];
  const app=el('app');
  const existing=app.querySelector('.q-panel');
  if(existing){const tmp=document.createElement('div');tmp.innerHTML=buildRankPanel(q);existing.replaceWith(tmp.firstElementChild);}
}

function submitRank(){
  if(rankSelections.length===0)return;
  const answer=rankSelections.map((s,i)=>`#${i+1}: ${s}`).join(', ');
  rankSelections=[];
  processAnswer(answer);
}

/* ── LOADING ── */
function screenLoading(){
  const h=msgs.map(m=>m.role==='bot'?`<div class="msg-bot"><div class="bot-icon"><div class="bot-dot"></div></div><div class="bot-bbl">${m.content}</div></div>`:`<div class="msg-user"><div class="user-bbl">${m.content}</div></div>`).join('');
  return`<div class="progress-wrap"><div class="progress-fill" style="width:100%"></div></div><div class="content-wrap"><div class="chat-header"><div class="avatar"><div class="avatar-dot"></div></div><span class="chat-name">AI Time Audit</span><span class="prog-label">8 of 8</span></div><div id="msgs" class="messages">${h}</div><div class="loading-zone"><div class="loading-top"><span class="loading-dot"></span><span class="loading-text">Pulling your personalized recommendations together...</span></div><div class="loading-bar-bg"><div class="loading-bar-animate"></div></div><p class="loading-note">This usually takes about 30 to 45 seconds. Worth the wait.</p></div></div>`;}

/* ── RESULTS ── */
function screenResults(){
  const recs=buildRecs();
  const dream=answers.dream||'';
  const closingText=dream?`You said you want to ${dream.charAt(0).toLowerCase()+dream.slice(1).replace(/\.+$/,'')}. Every recommendation here is built to buy back the hours keeping you from it.`:'';
  const goalNoteHTML=closingText?`<div class="goal-note"><div class="goal-note-inner"><p class="goal-note-text">${closingText}</p></div></div>`:'';
  const recsHTML=recs.map((r,i)=>{
    const toolHTML=(r.tool&&r.tool_url)?`<a href="${r.tool_url}" target="_blank" class="tool-chip"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>${r.tool}</a>`:'';
    const promptsHTML=(r.prompts||[]).map(p=>`<div class="prompt-item"><p class="prompt-text">${p}</p><button class="copy-btn" onclick="copyPrompt(this)">Copy</button></div>`).join('');
    const blogLinks=(r.blog_posts||[]).filter(b=>b&&b.url&&b.title).map(b=>`<a href="${b.url}" target="_blank">${b.title} &rarr;</a>`).join(' &nbsp;&middot;&nbsp; ');
    const furtherHTML=blogLinks?`<div class="further-reading"><span>Further reading:</span> ${blogLinks}</div>`:'';
    return`<div class="rec" style="animation-delay:${i*110}ms"><div class="rec-header"><span class="rec-num">0${i+1}</span><div class="rec-title-wrap"><div class="rec-title">${r.title}</div>${toolHTML}</div></div><div class="rec-body">${r.suggestion}</div>${promptsHTML?`<div class="rec-divider"></div><div class="prompts-section"><div class="prompts-eyebrow">Ready-to-use prompts</div>${promptsHTML}</div>`:''}${furtherHTML}</div>`;
  }).join('');

  // Only show inline email capture if they skipped the gate
  const inlineEmailHTML = !gateEmail ? `
    <div class="results-email-cap">
      <div class="results-email-eyebrow">Keep your results</div>
      <h3 class="results-email-title">Send these to your inbox</h3>
      <p class="results-email-sub">Drop your email and we will send you a copy to reference whenever you are ready to dig in.</p>
      <div class="results-email-fields">
        <input id="re-name" class="results-email-field" type="text" placeholder="First name" autocomplete="given-name">
        <input id="re-email" class="results-email-field" type="email" placeholder="Email address" autocomplete="email">
      </div>
      <button class="btn-results-email" id="re-submit" onclick="submitResultsEmail()">Send me my results</button>
      <p class="results-email-status" id="re-status"></p>
      <p class="results-email-error" id="re-error"></p>
    </div>` : '';

  return`<div class="results-wrap">
    <div class="r-header"><div class="r-eyebrow">Your Results</div><h2 class="r-title">Here is exactly<br>where to <em>start</em></h2></div>
    ${goalNoteHTML}
    <div class="recs">${recsHTML}</div>
    ${inlineEmailHTML}
    <div class="r-cta">
      <div class="r-cta-eyebrow">Ready to go deeper?</div>
      <h3 class="r-cta-title">Work smarter.<br><em>Shoot more.</em></h3>
      <p class="r-cta-body">In private mentoring, we work through business strategy, lighting, workflow, and time management. Every session is built around where you actually are and what will move the needle fastest.</p>
      <a href="https://www.taushadickinson.com/workshops" target="_blank" class="btn-cta-main">Explore Mentoring</a>
      <div class="r-cta-divider"></div>
      <button class="btn-restart" onclick="startChat()">Start the audit over</button>
    </div>
  </div>`;}

/* ── INLINE EMAIL SUBMIT (results bottom) ── */
async function submitResultsEmail(){
  const name  = (el('re-name')?.value||'').trim();
  const email = (el('re-email')?.value||'').trim();
  const errEl = el('re-error');
  const status= el('re-status');
  const btn   = el('re-submit');
  if(!email){ if(errEl) errEl.textContent='Please enter your email address.'; return; }
  if(btn) btn.disabled=true;
  if(status) status.textContent='Sending...';
  if(errEl) errEl.textContent='';
  try{
    const recs=buildRecs();
    const recSummary=recs.map((r,i)=>`0${i+1}. ${r.title} (${r.tool||'No tool'})`).join('\n');
    const recsFull=recs.map((r,i)=>{
      const prompts=(r.prompts||[]).map((p,pi)=>`Prompt ${pi+1}: ${p}`).join('\n\n');
      const blogs=(r.blog_posts||[]).map(b=>b.title).join(', ')||'None';
      return `REC 0${i+1}: ${r.title}\nTool: ${r.tool||'None'}\n\n${r.suggestion}\n\nPrompts:\n${prompts}\n\nFurther reading: ${blogs}`;
    }).join('\n\n---\n\n');
    const taushaSend2 = ejsSend(EMAILJS_TEMPLATE_TAUSHA, {
        to_email:'info@taushadickinson.com',
        name: name||'Not provided',
        photographer_name:name||'Not provided',
        photographer_email:email,
        submitted_at:new Date().toLocaleString('en-US',{timeZone:'America/Chicago'})+' (via results page)',
        q1_shoot:answers.shoot||'',q2_drain:answers.drain||'',q3_hours:answers.hours||'',
        q4_feel:answers.feel||'',q5_stage:answers.stage||'',q6_goal:answers.goal||'',
        q7_tools:answers.tools||'',q8_dream:answers.dream||'',
        recs_summary:recSummary,recs_full:recsFull
      }).catch(err=>console.warn('Tausha copy failed:',err.message));
    const photogSend2 = ejsSend(EMAILJS_TEMPLATE_PHOTOGRAPHER, {
        to_email:email,
        to_name:name||'Photographer',
        name:name||'Photographer',
        q1_shoot:answers.shoot||'Not provided',q2_drain:answers.drain||'Not provided',q8_dream:answers.dream||'Not provided',
        recs_full:recsFull,
        closing_note:answers.dream?`You said you want to ${answers.dream.charAt(0).toLowerCase()+answers.dream.slice(1).replace(/\.+$/,'')}. Every recommendation here is built to buy back the hours keeping you from it.`:''
      }).catch(err=>{ throw err; });
    await Promise.all([taushaSend2, photogSend2]);
    gateEmail=email;
    if(status) status.textContent='Sent! Check your inbox.';
    if(btn) btn.textContent='Sent';
  }catch(err){
    console.error(err);
    if(errEl) errEl.textContent='Something went wrong. Try again in a moment.';
    if(btn) btn.disabled=false;
    if(status) status.textContent='';
  }
}

/* ── INTERACTION ── */
function startChat(){phase='chat';msgs=[];qIdx=0;isTyping=false;newMsgIdx=-1;answers={};rankSelections=[];gateSending=false;gateEmail='';render();}

function answerBtn(btn){
  btn.classList.add('selected');
  document.querySelectorAll('.btn-opt').forEach(b=>{b.style.pointerEvents='none';b.style.opacity=(b===btn)?'1':'0.3';});
  setTimeout(()=>processAnswer(btn.dataset.v),240);
}

function processAnswer(a){
  answers[Qs[qIdx].id]=a;
  newMsgIdx=msgs.length;
  msgs.push({role:'bot',content:Qs[qIdx].text});
  msgs.push({role:'user',content:a});
  qIdx++;isTyping=true;render();scrollToBottom();
  setTimeout(()=>{isTyping=false;if(qIdx<Qs.length){render();scrollToBottom();}else{phase='loading';render();}},620);
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submitText();}}
function submitText(){const t=el('ainput');if(!t||!t.value.trim())return;processAnswer(t.value.trim());}

/* ── Boot ── */
render();

// Tell parent iframe to resize — works with Squarespace embed blocks
function reportHeight(){
  const h = document.getElementById('app')?.offsetHeight || document.body.offsetHeight;
  window.parent.postMessage({type:'resize',height:h},'*');
}
const resizeObs = new ResizeObserver(()=>reportHeight());
resizeObs.observe(document.getElementById('app')||document.body);
reportHeight();
setInterval(reportHeight,500);

async function ejsSend(templateId, params){
  const res = await fetch('https://api.emailjs.com/api/v1.0/email/send',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      service_id: EMAILJS_SERVICE_ID,
      template_id: templateId,
      user_id: EMAILJS_PUBLIC_KEY,
      template_params: params
    })
  });
  if(!res.ok){
    const txt = await res.text();
    throw new Error(`${res.status}: ${txt}`);
  }
  return res;
}
</script>
